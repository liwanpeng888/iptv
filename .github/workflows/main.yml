name: 'Update schedule'

# ⚠️注意：请不要在 fork 的仓库中添加 `on: schedule` 定时任务（cron）。
# Forks 可能被大量复制并触发定时执行，当前 GitHub Actions 资源使用已接近上限，
# 大量 fork 的定时任务可能导致工作流被禁用。若需要定时执行，请使用其它部署方式。
#
# ⚠️NOTICE: Do NOT add `on: schedule` cron triggers in forked repositories.
# Forks may multiply scheduled runs and GitHub Actions resource usage is near limits.
# Many scheduled workflows from forks can cause workflows to be disabled.
# If scheduled execution is required, use other deployment methods.

# 添加权限配置 - 这是关键！
permissions:
  contents: write

on:
  workflow_dispatch:
  # 如果你想要定时执行，可以取消下面的注释
  # schedule:
  #   - cron: '0 0 * * *'  # 每天 UTC 0 点执行

jobs:
  push:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [ 'ubuntu-latest' ]
    steps:
      - name: Set branch name
        id: vars
        run: |
          # 优化分支名称逻辑：优先用触发分支，其次判断仓库所有者
          TRIGGER_BRANCH=${{ github.ref_name }}
          if [[ "${{ github.repository_owner }}" == "Guovin" ]]; then
            BRANCH_NAME="gd"
          else
            BRANCH_NAME=${TRIGGER_BRANCH:-"main"}  # 默认分支改为 main（更通用）
          fi
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "分支名称设置为: $BRANCH_NAME"
          
      # 更新 actions/checkout 到 v4
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}
          fetch-depth: 0  # 获取完整历史，避免冲突
          # 使用个人访问令牌（PAT）替代默认 token，解决权限问题
          # 注意：需要在仓库设置中添加名为 PAT 的 secret
          token: ${{ secrets.PAT || github.token }}
          
      # 更新 actions/setup-python 到 v5
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'
          
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
        
      - name: Install pipenv
        run: pip3 install --user pipenv
        
      - name: Install dependencies
        run: |
          pipenv --python 3.13 || true  # 避免已存在时报错
          pipenv install --deploy --ignore-pipfile
          
      - name: Run update script
        run: pipenv run dev
        # 添加错误处理：脚本执行失败时工作流继续
        continue-on-error: false
        
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查是否有文件变更
          if git status --porcelain | grep -q .; then
            git add .
            git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M:%S')"
            
            # 拉取远程更改并处理冲突（自动合并）
            echo "Pulling remote changes..."
            git pull origin ${{ env.BRANCH_NAME }} --rebase --autostash || git rebase --abort
            
            # 推送更改（重试机制）
            echo "Pushing changes..."
            for i in {1..3}; do
              git push origin ${{ env.BRANCH_NAME }} && break
              echo "Push failed, retrying in 5 seconds... (Attempt $i/3)"
              sleep 5
            done
          else
            echo "No changes to commit"
          fi
